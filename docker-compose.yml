# Egret Nest Dashboard — self-hosted deployment.
#
#   docker compose up -d                 # dashboard on http://localhost:8080
#   docker compose --profile tls up -d   # + nginx TLS reverse proxy on :443
#
# Copy .env.example to .env and set your secrets first. See docs/DEPLOY.md.

services:
  egret-nest:
    build:
      context: .
      args:
        VERSION: ${EGRET_NEST_VERSION:-dev}
    # GHCR (auto-published + SLSA-signed). Docker Hub mirror: nx1x/egret-nest
    image: ghcr.io/nx1x/egret-nest:${EGRET_NEST_VERSION:-latest}
    restart: unless-stopped
    # No published port when running behind nginx (the tls profile); for the
    # bare dashboard, expose 8080 on the host.
    ports:
      - "${EGRET_NEST_BIND:-127.0.0.1:8080}:8080"
    environment:
      EGRET_NEST_INSTANCE: ${EGRET_NEST_INSTANCE:-Egret Nest}
      EGRET_NEST_DB: /data/egret-nest.db
      # Set when running behind the nginx TLS proxy so the app trusts
      # X-Forwarded-Proto and issues Secure / __Host- cookies.
      EGRET_NEST_BEHIND_PROXY: ${EGRET_NEST_BEHIND_PROXY:-0}
      EGRET_NEST_BASE_URL: ${EGRET_NEST_BASE_URL:-}
      # At-rest encryption for TOTP seeds (32-byte hex/base64). Strongly recommended.
      EGRET_NEST_SECRET_KEY: ${EGRET_NEST_SECRET_KEY:-}
      EGRET_NEST_WEBHOOK_SECRET: ${EGRET_NEST_WEBHOOK_SECRET:-}
      EGRET_NEST_METRICS_TOKEN: ${EGRET_NEST_METRICS_TOKEN:-}
      EGRET_NEST_RETENTION_DAYS: ${EGRET_NEST_RETENTION_DAYS:-0}
      # SSO (optional) — see docs/AUTH.md.
      EGRET_NEST_GITHUB_CLIENT_ID: ${EGRET_NEST_GITHUB_CLIENT_ID:-}
      EGRET_NEST_GITHUB_CLIENT_SECRET: ${EGRET_NEST_GITHUB_CLIENT_SECRET:-}
      EGRET_NEST_GITHUB_ALLOWED_ORG: ${EGRET_NEST_GITHUB_ALLOWED_ORG:-}
      EGRET_NEST_OIDC_ISSUER: ${EGRET_NEST_OIDC_ISSUER:-}
      EGRET_NEST_OIDC_CLIENT_ID: ${EGRET_NEST_OIDC_CLIENT_ID:-}
      EGRET_NEST_OIDC_CLIENT_SECRET: ${EGRET_NEST_OIDC_CLIENT_SECRET:-}
      EGRET_NEST_OIDC_ALLOWED_DOMAIN: ${EGRET_NEST_OIDC_ALLOWED_DOMAIN:-}
    volumes:
      - egret-nest-data:/data
    # Runtime hardening: read-only rootfs (the app only writes to /data), no
    # privilege escalation, all Linux capabilities dropped, small tmpfs for /tmp.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    healthcheck:
      # In-process GET /healthz (distroless has no shell/curl) — actually exercises
      # the HTTP server, unlike `version` which only prints a string.
      test: ["CMD", "/egret-nest", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.29-alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de  # digest-pinned; Renovate maintains
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      - egret-nest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # Provide fullchain.pem + privkey.pem (e.g. from certbot) here:
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    # The edge component is hardened too: read-only rootfs (with tmpfs for the
    # paths nginx writes), no privilege escalation, all caps dropped except those
    # nginx needs to bind :80/:443 and drop worker privileges.
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run
      - /tmp:size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  egret-nest-data:
