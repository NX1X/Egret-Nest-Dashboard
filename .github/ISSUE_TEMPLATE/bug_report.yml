name: Bug report
description: Something in Egret Nest Dashboard behaves incorrectly (not a security vulnerability)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security bug?** Do not file it here — report privately (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you observed vs. what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How you deployed it, the request(s) sent (e.g. a sample /ingest payload with secrets redacted), and what the dashboard showed.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Egret Nest version
      description: The release tag / image digest, or `main` + commit.
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running it?
      options:
        - Binary
        - Container image
        - From source
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant server log excerpt. Redact tokens and any ingested data.
      render: shell
