name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - run: go mod download
      - name: Format check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      # Dogfood: run the dashboard's test suite under the published Egret Action
      # (audit - monitors the egress/exec/file behaviour of the toolchain +
      # dependency code during the tests, and never blocks CI). Egret guarding a
      # real consumer build.
      - name: Test with coverage (guarded by Egret, audit)
        uses: NX1X/Egret@54e38cd7f67b259ffcad44c87057cd500af8842c # v0.1.2
        with:
          version: latest
          mode: audit
          upload-sarif: "false"
          command: |
            go test -coverprofile=coverage.out ./...
            go tool cover -func=coverage.out | tail -1
      - name: Build (static, CGO off)
        run: CGO_ENABLED=0 go build ./...
      - name: Verify module checksums
        run: go mod verify
      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...
