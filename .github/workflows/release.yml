# Release: on a version tag, build the static binary + SHA256SUMS and publish a
# GitHub Release, and build + push the container image to GHCR pinned by digest.
# Both artifacts carry SLSA build provenance (keyless, OIDC). Operators self-host,
# so a release is "here's a new version to deploy," not a hosted rollout.
name: release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual re-run of an EXISTING tag's release (e.g. a prior run failed partway).
  # Supply the already-pushed tag; the jobs check it out and (re)publish. It does
  # NOT create tags - the tag must already exist (the release step --verify-tag's it).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to (re)release, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

# Serialize per-tag so a double/re-push (or a manual re-run) can't race two publishes.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  binary:
    name: Binary + GitHub Release
    # Pin the runner on the trust path (reproducible release build); bump
    # deliberately when GitHub deprecates the image. CI stays on ubuntu-latest.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # `release` is a protected GitHub Environment: configure required reviewers +
    # (optionally) a wait timer in repo Settings → Environments so a tag push
    # can't publish unattended. Referencing a not-yet-created environment is
    # harmless (GitHub creates it unprotected until you add rules).
    environment: release
    permissions:
      contents: write      # create the GitHub Release + upload assets
      id-token: write      # OIDC for keyless SLSA provenance
      attestations: write  # store the build provenance attestation
    # Resolve the tag once: on a tag push it's the pushed tag; on a manual dispatch
    # it's the typed input (github.ref_name would be the branch, not a tag).
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      # Don't persist the ambient GITHUB_TOKEN into .git/config: the release step
      # uses its own GH_TOKEN, and the build runs third-party module code that must
      # not see push credentials.
      - name: Validate release tag format
        run: |
          # Reject anything that isn't vMAJOR.MINOR.PATCH before we check out that
          # ref or spend build minutes - guards a mistyped manual-dispatch input
          # (e.g. a branch name) from reaching checkout/build/publish.
          [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::TAG '${TAG}' is not a vMAJOR.MINOR.PATCH release tag."; exit 1; }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Pin the patched toolchain (crypto/tls GO-2026-5856 + related stdlib
          # advisories, all fixed in go1.26.5) so the release ships reproducibly + vuln-free.
          go-version: "1.26.5"
          # No build cache on the release/trust path: a cache entry populated by a
          # lower-privileged workflow (PR) must not be restorable here (cache poisoning).
          cache: false

      - name: Verify module checksums
        run: go mod verify

      - name: Build static binary (CGO off, pure-Go SQLite)
        env:
          VERSION: ${{ env.TAG }}
        run: make build VERSION="${VERSION}"

      - name: Package assets (egret-nest_linux_amd64 + SHA256SUMS)
        run: |
          cp bin/egret-nest egret-nest_linux_amd64
          sha256sum egret-nest_linux_amd64 > SHA256SUMS
          echo "--- SHA256SUMS ---"; cat SHA256SUMS

      # SLSA build provenance (keyless, OIDC):
      #   gh attestation verify egret-nest_linux_amd64 --repo NX1X/Egret-Nest-Dashboard
      - name: Attest build provenance (binary)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "egret-nest_linux_amd64, SHA256SUMS"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release notes come from the matching CHANGELOG.md section (curated, per
          # "Keep a Changelog"); fall back to auto-generated notes if this version has
          # no section yet. Keep CHANGELOG.md updated per release for rich release notes.
          VER="${TAG#v}"
          NOTES="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="${VER}" '
            $0 ~ ("^## \\[" ver "\\]") { g=1; print; next }
            g && (/^## \[/ || /^\[[0-9]/) { exit }
            g { print }
          ' CHANGELOG.md > "${NOTES}" || true
          notes_args=(--generate-notes)
          [ -s "${NOTES}" ] && notes_args=(--notes-file "${NOTES}")
          # Idempotent so a manual re-run of an existing tag republishes cleanly:
          # refresh notes (when a section exists) + re-upload assets (--clobber).
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists - updating notes + re-uploading assets."
            [ -s "${NOTES}" ] && gh release edit "${TAG}" --notes-file "${NOTES}"
            gh release upload "${TAG}" egret-nest_linux_amd64 SHA256SUMS --clobber
          else
            gh release create "${TAG}" \
              egret-nest_linux_amd64 SHA256SUMS \
              --title "${TAG}" \
              "${notes_args[@]}" \
              --verify-tag
          fi

  image:
    name: Container image (GHCR, digest-pinned)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: read
      packages: write      # push to GHCR
      id-token: write      # OIDC for keyless SLSA provenance
      attestations: write  # store the image provenance attestation
    # Resolve the tag once: on a tag push it's the pushed tag; on a manual dispatch
    # it's the typed input (github.ref_name would be the branch, not a tag).
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      # First step: baseline the runner and audit egress. This job holds GHCR +
      # Docker Hub push credentials, so record every network destination the build
      # (including third-party module + base-image code) reaches. Audit-only for now.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate release tag format
        run: |
          # Reject anything that isn't vMAJOR.MINOR.PATCH before we check out that
          # ref or spend build minutes - guards a mistyped manual-dispatch input
          # (e.g. a branch name) from reaching checkout/build/publish.
          [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::TAG '${TAG}' is not a vMAJOR.MINOR.PATCH release tag."; exit 1; }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Build image (from digest-pinned bases)
        id: build
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          # GHCR requires a lowercase repository path.
          IMG=$(echo "ghcr.io/${OWNER}/egret-nest" | tr '[:upper:]' '[:lower:]')
          docker build --build-arg VERSION="${TAG}" -t "${IMG}:${TAG}" .
          echo "image=${IMG}" >> "${GITHUB_OUTPUT}"
          echo "Built ${IMG}:${TAG}"

      # Vulnerability gate: scan the locally-built image BEFORE any registry push or
      # SLSA attestation. A HIGH/CRITICAL finding fails the job (exit-code 1), so a
      # vulnerable image is never published. Unfixed CVEs (no upstream patch yet) are
      # skipped - blocking on them would be unactionable. Pinned by full SHA per the
      # repo's action-pinning discipline.
      - name: Scan image for vulnerabilities (Trivy, blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build.outputs.image }}:${{ env.TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image + floating tags
        id: push
        env:
          GH_TOKEN: ${{ github.token }}   # for `gh release list` (needs contents:read)
          IMG: ${{ steps.build.outputs.image }}
        run: |
          docker push "${IMG}:${TAG}"
          # Floating tags: latest, vMAJOR (v0), vMAJOR.MINOR (v0.1). Each moves ONLY
          # when TAG is the highest published release within its own scope, so a
          # manual re-run of an OLDER tag never regresses a floating tag to a stale
          # (possibly vulnerable) image.
          RELEASES=$(gh release list --exclude-drafts --exclude-pre-releases \
            --json tagName --jq '.[].tagName' || true)
          MAJOR=$(printf '%s' "${TAG}" | cut -d. -f1)     # e.g. v0
          MINOR=$(printf '%s' "${TAG}" | cut -d. -f1-2)   # e.g. v0.1
          is_highest() {  # $1 = "@" for all releases, else a vX / vX.Y prefix
            local pool hi esc
            if [ "$1" = "@" ]; then
              pool="${RELEASES}"
            else
              esc=$(printf '%s' "$1" | sed 's/[.]/\\./g')
              pool=$(printf '%s\n' "${RELEASES}" | grep -E "^${esc}(\.|$)" || true)
            fi
            hi=$(printf '%s\n' "${pool}" | sort -V | tail -1)
            [ -z "${hi}" ] || [ "$(printf '%s\n%s\n' "${hi}" "${TAG}" | sort -V | tail -1)" = "${TAG}" ]
          }
          FLOAT=""
          is_highest "@"        && FLOAT="${FLOAT} latest"
          is_highest "${MAJOR}" && FLOAT="${FLOAT} ${MAJOR}"
          is_highest "${MINOR}" && FLOAT="${FLOAT} ${MINOR}"
          FLOAT=$(echo ${FLOAT})   # normalize whitespace
          for t in ${FLOAT}; do
            docker tag "${IMG}:${TAG}" "${IMG}:${t}"
            docker push "${IMG}:${t}"
            echo "Moved ${IMG}:${t} -> ${TAG}"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMG}:${TAG}" | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "float=${FLOAT}" >> "${GITHUB_OUTPUT}"
          echo "Pushed ${IMG}:${TAG} @ ${DIGEST} (float: ${FLOAT:-none})"

      # Mirror the SAME image to Docker Hub (for distribution + public pull count).
      # The token lives ONLY in the login step, after `docker build` has already
      # run, so third-party build code never sees it. Requires two repo secrets:
      # DOCKERHUB_USERNAME (a Docker Hub account) + DOCKERHUB_TOKEN (a Read & Write
      # access token). The image digest is identical to GHCR, so the GHCR build
      # attestation still verifies this copy by digest.
      - name: Log in to Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "${DH_TOKEN}" | docker login docker.io -u "${DH_USER}" --password-stdin

      - name: Mirror image to Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          SRC: ${{ steps.build.outputs.image }}
          FLOAT: ${{ steps.push.outputs.float }}
        run: |
          DH=$(echo "docker.io/${DH_USER}/egret-nest" | tr '[:upper:]' '[:lower:]')
          docker tag "${SRC}:${TAG}" "${DH}:${TAG}"
          docker push "${DH}:${TAG}"
          for t in ${FLOAT}; do
            docker tag "${SRC}:${TAG}" "${DH}:${t}"
            docker push "${DH}:${t}"
            echo "Pushed ${DH}:${t}"
          done
          echo "Pushed ${DH}:${TAG} (float: ${FLOAT:-none})"

      # Docker Hub does not read the GitHub README or OCI labels. Sync the README
      # + short description straight to the Docker Hub API with stdlib python (no
      # third-party Action - the repo's Actions allowlist forbids them). Runs after
      # the image push so the repo exists. Cosmetic, so it never fails the release.
      - name: Sync README to Docker Hub
        continue-on-error: true
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          user = os.environ["DH_USER"]
          repo = f"{user}/egret-nest".lower()
          login = urllib.request.Request(
              "https://hub.docker.com/v2/users/login/",
              data=json.dumps({"username": user, "password": os.environ["DH_TOKEN"]}).encode(),
              headers={"Content-Type": "application/json"}, method="POST")
          jwt = json.load(urllib.request.urlopen(login))["token"]
          short = "Self-hosted dashboard for Egret - CI/CD egress telemetry; data stays on your infra"
          body = json.dumps({"description": short[:100],
                             "full_description": open("README.md").read()}).encode()
          patch = urllib.request.Request(
              f"https://hub.docker.com/v2/repositories/{repo}/",
              data=body, method="PATCH",
              headers={"Content-Type": "application/json", "Authorization": "JWT " + jwt})
          print("Docker Hub description synced:", urllib.request.urlopen(patch).status)
          PY

      # SLSA build provenance for the image (verify with:
      #   gh attestation verify oci://ghcr.io/nx1x/egret-nest@<digest> --repo NX1X/Egret-Nest-Dashboard)
      - name: Attest build provenance (image)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.build.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
