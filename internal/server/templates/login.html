<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Instance}} - sign in</title>
<link rel="stylesheet" href="/static/app.css">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body class="auth">
  <h1>🪶 {{.Instance}}</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  {{if .GitHub}}
  <a href="/auth/github/login" class="provider">Sign in with GitHub</a>
  {{end}}
  {{if .OIDCName}}
  <a href="/auth/oidc/login" class="provider">Sign in with {{.OIDCName}}</a>
  {{end}}
  {{if or .GitHub .OIDCName}}
  <p class="or muted">or</p>
  {{end}}
  <form method="POST" action="/login" autocomplete="off">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <label for="login">Login</label>
    <input id="login" name="login" autocapitalize="none" autofocus required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>
    <label for="totp">2FA code <span class="muted">(if enabled)</span></label>
    <input id="totp" name="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]*">
    <button type="submit">Sign in</button>
  </form>
  {{template "ghfooter"}}
</body>
</html>
