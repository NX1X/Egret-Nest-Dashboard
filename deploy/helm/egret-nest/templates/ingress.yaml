{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "egret-nest.fullname" . }}
  labels: {{- include "egret-nest.labels" . | nindent 4 }}
  {{- $annotations := deepCopy (.Values.ingress.annotations | default dict) }}
  {{- if and .Values.ingress.sslRedirect (not (hasKey $annotations "nginx.ingress.kubernetes.io/ssl-redirect")) }}
  {{- $_ := set $annotations "nginx.ingress.kubernetes.io/ssl-redirect" "true" }}
  {{- end }}
  {{- with $annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "egret-nest.fullname" . }}
                port:
                  name: http
{{- end }}
