{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "egret-nest.fullname" . }}
  labels: {{- include "egret-nest.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "egret-nest.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow traffic to the HTTP port (from the ingress controller / same ns).
    - ports:
        - port: http
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFrom }}
      from: {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS out - for SSO (GitHub/OIDC) and webhook verification. Tighten to
    # specific CIDRs via networkPolicy.egressTo if your IdP endpoints are fixed.
    - ports:
        - port: 443
          protocol: TCP
      {{- with .Values.networkPolicy.egressTo }}
      to: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
