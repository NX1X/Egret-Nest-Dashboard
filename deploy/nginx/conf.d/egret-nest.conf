# Egret Nest - server block. Terminates TLS and proxies to the dashboard.
# Set your domain below and provide certs at /etc/nginx/certs/{fullchain,privkey}.pem.

upstream egret_nest {
    server egret-nest:8080;
    keepalive 16;
}

# Redirect all plaintext HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    # Allow ACME HTTP-01 challenges through if you use certbot webroot.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 308 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name egret.example.com;   # <-- change me

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # The app sets CSP / X-Frame-Options / nosniff / HSTS (when it sees HTTPS),
    # so we forward X-Forwarded-Proto=https and let it own those headers.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 65s;

    # Unauthenticated, machine-facing endpoints get the tighter rate limit.
    location = /ingest {
        limit_req zone=ingest burst=20 nodelay;
        proxy_pass http://egret_nest;
    }
    location = /webhook/github {
        limit_req zone=ingest burst=20 nodelay;
        proxy_pass http://egret_nest;
    }

    # /metrics is token-gated by the app, but as defense-in-depth it should be
    # scraped from inside the network, not exposed to the public internet.
    location = /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://egret_nest;
    }

    location / {
        limit_req zone=web burst=60 nodelay;
        proxy_pass http://egret_nest;
    }
}
