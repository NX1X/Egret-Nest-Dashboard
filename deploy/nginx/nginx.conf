# Egret Nest — nginx TLS reverse proxy (main config).
# TLS termination + rate limiting; the app owns its own security headers (CSP,
# X-Frame-Options, HSTS-when-secure), so we do not duplicate them here.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't advertise the nginx version.
    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    # Match the app's 8 MiB ingest limit (bodies larger are refused at the edge).
    client_max_body_size 8m;
    client_body_timeout  15s;
    client_header_timeout 15s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate-limit zones: a tighter one for unauthenticated ingest/webhook, a
    # general one for the UI. Applied per-location in conf.d.
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
