<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Egret app icon">
  <title>Egret</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173A54"/>
      <stop offset="1" stop-color="#0B1B2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.78" r="0.7">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="egress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#5FEAD9"/>
    </linearGradient>
  </defs>

  <!-- rounded product tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#2DD4BF" stroke-opacity="0.15" stroke-width="2"/>

  <!-- the mark, scaled 1.7x from the 256 grid and centred with padding -->
  <g transform="translate(38,44) scale(1.72)">
    <!-- egress line: the outbound traffic the egret watches -->
    <line x1="40" y1="196" x2="216" y2="196" stroke="url(#egress)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="216" cy="196" r="8" fill="#5FEAD9"/>
    <!-- egret: neck + body -->
    <g fill="none" stroke="#F5F7FA" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M120 188 C104 156 150 150 138 112 C132 92 150 78 168 80"/>
      <path d="M120 188 C96 184 84 168 96 150 C108 134 140 138 150 118" stroke-width="15"/>
    </g>
    <!-- head + beak + crest -->
    <circle cx="171" cy="79" r="12" fill="#F5F7FA"/>
    <path d="M182 76 L214 66 L184 86 Z" fill="#F5B54B"/>
    <path d="M166 70 C176 52 190 46 206 44" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round"/>
    <!-- legs -->
    <g stroke="#F5F7FA" stroke-width="7" stroke-linecap="round">
      <line x1="112" y1="186" x2="108" y2="212"/>
      <line x1="126" y1="186" x2="130" y2="212"/>
    </g>
  </g>
</svg>
